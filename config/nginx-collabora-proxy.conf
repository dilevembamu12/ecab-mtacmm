# Nginx reverse proxy for Collabora Online
# Placer dans /www/server/panel/vhost/nginx/ecab.fbb.local.collabora.conf
# ou dans /etc/nginx/conf.d/collabora.conf

server {
    listen 9980;
    server_name votre-domaine.local;

    # Static files (CSS, JS, images)
    location ^~ /browser {
        proxy_pass http://127.0.0.1:9981;
        proxy_set_header Host $http_host;
    }

    # WOPI discovery endpoint
    location ^~ /hosting/discovery {
        proxy_pass http://127.0.0.1:9981;
        proxy_set_header Host $http_host;
    }

    location ^~ /hosting/capabilities {
        proxy_pass http://127.0.0.1:9981;
        proxy_set_header Host $http_host;
    }

    # WebSocket connections for real-time editing
    location ~ ^/cool/(.*)/ws$ {
        proxy_pass http://127.0.0.1:9981;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 36000s;
    }

    # All other requests
    location / {
        proxy_pass http://127.0.0.1:9981;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 36000s;
    }
}
